spring:
  application:
    name: youtubeApp
  thymeleaf:
    cache: false
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/youtube_db}
    username: ${DB_USERNAME:youtube_user}
    password: ${DB_PASSWORD:Saika0527@}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
