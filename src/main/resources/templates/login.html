<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Youtubu 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<main class="login-shell">
    <section class="brand-panel">
        <p class="eyebrow">VIDEO PLATFORM</p>
        <h1>Youtubu에 다시 접속하세요</h1>
        <p class="description">
            구독 채널, 재생 목록, 업로드 대시보드를 한 번에 관리할 수 있는 내부 관리자 로그인 화면입니다.
        </p>
        <div class="feature-list">
            <div>
                <strong>실시간 대시보드</strong>
                <span>콘텐츠 성과와 알림을 빠르게 확인</span>
            </div>
            <div>
                <strong>안전한 계정 접근</strong>
                <span>팀 운영을 위한 계정 분리와 권한 제어</span>
            </div>
        </div>
    </section>

    <section class="form-panel">
        <div class="form-card">
            <div class="logo">YT</div>
            <h2>로그인</h2>
            <p class="form-copy">이메일과 비밀번호를 입력해 계정에 접속하세요.</p>

            <form class="login-form">
                <label for="email">이메일</label>
                <input id="email" name="email" type="email" placeholder="name@youtubu.com">

                <label for="password">비밀번호</label>
                <input id="password" name="password" type="password" placeholder="비밀번호를 입력하세요">

                <div class="form-row">
                    <label class="checkbox">
                        <input type="checkbox" name="rememberMe">
                        <span>로그인 상태 유지</span>
                    </label>
                    <a href="#" class="helper-link">비밀번호 찾기</a>
                </div>

                <button type="submit">계속하기</button>
            </form>

            <p class="signup-copy">
                아직 계정이 없나요?
                <a href="#">관리자 등록 요청</a>
            </p>
        </div>
    </section>
</main>
</body>
</html>
