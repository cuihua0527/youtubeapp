<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body class="dashboard-body">
<main class="dashboard-shell">
    <section class="dashboard-card">
        <p class="eyebrow">LOGIN SUCCESS</p>
        <h1 th:text="${account.displayName} + ' 님, 환영합니다.'">Saika Admin 님, 환영합니다.</h1>
        <p class="description">
            <span th:text="${account.email}">admin@youtubu.com</span>
            계정으로 인증되었으며 권한은
            <strong th:text="${account.role}">MASTER</strong>
            입니다.
        </p>

        <div class="dashboard-grid">
            <article>
                <strong>처리 계층</strong>
                <span>Controller -> Service -> DAO</span>
            </article>
            <article>
                <strong>저장소</strong>
                <span>PostgreSQL / admin_account</span>
            </article>
            <article>
                <strong>애플리케이션</strong>
                <span>Spring Boot 3 + Thymeleaf</span>
            </article>
        </div>

        <a class="logout-link" th:href="@{/login(logout=true)}">로그아웃</a>
    </section>
</main>
</body>
</html>
